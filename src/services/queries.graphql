query getAuditData($login: String!) {
  user(login: $login) {
    name
    bio
    avatarUrl
    repositories(first: 50, orderBy: {field: STARGAZERS, direction: DESC}) {
      nodes {
        name
        description
        stargazerCount
        forkCount
        languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
          edges {
            size
            node {
              name
            }
          }
        }
        packageJson: object(expression: "HEAD:package.json") {
          ... on Blob {
            text
          }
        }
        requirementsTxt: object(expression: "HEAD:requirements.txt") {
          ... on Blob {
            text
          }
        }
        readme: object(expression: "HEAD:README.md") {
          ... on Blob {
            text
          }
        }
        url
        updatedAt
      }
    }
  }
}
